services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: kajupilot
      POSTGRES_USER: kajuadmin
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kajuadmin -d kajupilot"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  api:
    build:
      context: ./kajupilot-api
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://kajuadmin:${DB_PASSWORD}@postgres:5432/kajupilot
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET}
      ADMIN_SETUP_CODE: ${ADMIN_SETUP_CODE}
      ADMIN_USER: ${ADMIN_USER}
      ADMIN_SECRET: ${ADMIN_SECRET}
      AI_PROVIDER: ${AI_PROVIDER:-openai}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      OPENAI_INPUT_COST_PER_1M: ${OPENAI_INPUT_COST_PER_1M:-0.15}
      OPENAI_OUTPUT_COST_PER_1M: ${OPENAI_OUTPUT_COST_PER_1M:-0.60}
      GROQ_API_KEY: ${GROQ_API_KEY}
      GROQ_MODEL: ${GROQ_MODEL:-meta-llama/llama-4-scout-17b-16e-instruct}
      GROQ_INPUT_COST_PER_1M: ${GROQ_INPUT_COST_PER_1M:-0.11}
      GROQ_OUTPUT_COST_PER_1M: ${GROQ_OUTPUT_COST_PER_1M:-0.34}
      AI_MAX_TOKENS: ${AI_MAX_TOKENS:-700}
      AI_TEMPERATURE: ${AI_TEMPERATURE:-0.2}
      AI_PARSE_RATE_LIMIT_PER_HOUR: ${AI_PARSE_RATE_LIMIT_PER_HOUR:-20}
      NODE_ENV: production
      PORT: 3000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - internal
      - external

  admin:
    build:
      context: ./kajupilot-admin
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      ADMIN_API_URL: ${ADMIN_API_URL:-http://api:3000/api/v1}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
      ADMIN_SECRET: ${ADMIN_SECRET}
      ADMIN_USER: ${ADMIN_USER}
      NODE_ENV: production
      PORT: 3001
      HOSTNAME: 0.0.0.0
    depends_on:
      - api
    networks:
      - internal
      - external

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    environment:
      API_HOST: ${API_HOST}
      ADMIN_HOST: ${ADMIN_HOST}
      ADMIN_USER: ${ADMIN_USER}
      ADMIN_PASS_HASH: ${ADMIN_PASS_HASH}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api
      - admin
    networks:
      - external

volumes:
  postgres_data:
  caddy_data:
  caddy_config:

networks:
  internal:
    driver: bridge
    internal: true
  external:
    driver: bridge
